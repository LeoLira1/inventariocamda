name: Android Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de release (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate prepare script invariants
        run: ./scripts/test_prepare_script_static.sh

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build project
        run: ./scripts/prepare_flutter_project.sh

      - name: Build APK
        run: |
          cd build_app
          flutter build apk --release

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag exists for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ steps.release_tag.outputs.tag }}" || true
          git push origin "${{ steps.release_tag.outputs.tag }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventario-camda-apk
          path: build_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: build_app/build/app/outputs/flutter-apk/app-release.apk
